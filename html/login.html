<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Kyoshi</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<link rel="stylesheet" href="../css/login.css">
</head>

<body>

<div class="login-container">

  <div class="login-left">
    <img src="../assets/img/logo.png" style="width:120px;">
  </div>

  <div class="login-right">

    <div class="login-box">

      <h3 class="fw-bold mb-4">Member Sign In</h3>

      <div class="mb-3">
        <label>Email Address</label>
        <input type="email" class="form-control" placeholder="Enter email">
      </div>

      <div class="mb-3">
        <label>Password</label>

        <div class="password-wrapper">
          <input type="password" id="password" class="form-control" placeholder="Enter password">
          <i class="bi bi-eye eye-icon" id="togglePassword"></i>
        </div>

      </div>

      <div class="d-flex justify-content-between mb-3">
        <div>
          <input type="checkbox"> Remember me
        </div>
        <a href="#">Forgot password?</a>
      </div>

      <button class="btn btn-main text-white">Login</button>

      <p class="text-center mt-5">New here? <br>
        <a href="signup.html" class="fw-bold">Create an account</a>
      </p>

    </div>

  </div>

</div>

<script src="js/login.js"></script>

</body>
</html>
